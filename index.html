/* Slider Container */
.slider{
    position: relative;
    width: 100%;
    max-width: 250px;      /* Pehle 320-360px hoga */
    height: 430px;         /* Pehle 560-600px tha */
    margin: 15px auto;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,.12);
    background: #0b1220;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}


/* Slides */
.slides{
    display:flex;
    width:100%;
    height:100%;
    transition:transform .5s ease;
}

.slide{
    min-width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Images */
.slide img{
    width:75%;          /* image chhoti hogi */
    height:auto;
    max-height:450px;
    object-fit:contain;
    border-radius:12px;
}



    

.slide::after {
  content: attr(data-caption);
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 16px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(2,6,23,.62);
  color: #fff;
  font-size: 14px;
  backdrop-filter: blur(8px);
}

.slide::after{
    display:none;
}

  <script>
    (function () {
      var slides = document.querySelector('[data-slides]');
      var dotsWrap = document.querySelector('[data-dots]');
      var total = slides.children.length;
      var index = 0;
      var timer;

      function renderDots() {
        dotsWrap.innerHTML = '';
        for (var i = 0; i < total; i++) {
          var dot = document.createElement('button');
          dot.className = 'dot' + (i === index ? ' is-active' : '');
          dot.type = 'button';
          dot.setAttribute('aria-label', 'Go to image ' + (i + 1));
          dot.addEventListener('click', function (i) { return function () { goTo(i); restart(); }; }(i));
          dotsWrap.appendChild(dot);
        }
      }

      function goTo(next) {
        index = (next + total) % total;
        slides.style.transform = 'translateX(' + (-index * 100) + '%)';
        Array.prototype.forEach.call(dotsWrap.children, function (dot, i) { dot.classList.toggle('is-active', i === index); });
      }

      function restart() { clearInterval(timer); timer = setInterval(function () { goTo(index + 1); }, 4000); }

      document.querySelector('[data-prev]').addEventListener('click', function () { goTo(index - 1); restart(); });
      document.querySelector('[data-next]').addEventListener('click', function () { goTo(index + 1); restart(); });
      renderDots();
      goTo(0);
      restart();
    })();
  </script>
